<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Magnetic pair distribution function concept</title>
  <desc id="desc">A dark scientific diagram showing spin correlations and an mPDF signal.</desc>
  <rect width="900" height="520" fill="#090d12"/>
  <rect x="30" y="30" width="860" height="460" rx="18" fill="#111820" stroke="#2d3c48"/>
  <text x="58" y="76" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Magnetic Pair Distribution Function</text>
  <g transform="translate(92 126)" stroke-linecap="round">
    <g stroke="#2d3c48" stroke-width="3">
      <path d="M0 60 H300 M0 160 H300 M0 260 H300 M60 0 V320 M160 0 V320 M260 0 V320"/>
    </g>
    <g stroke="#ffcc66" stroke-width="5">
      <path d="M60 60 l0 -38"/><path d="M160 60 l0 38"/><path d="M260 60 l0 -38"/>
      <path d="M60 160 l0 38"/><path d="M160 160 l0 -38"/><path d="M260 160 l0 38"/>
      <path d="M60 260 l0 -38"/><path d="M160 260 l0 38"/><path d="M260 260 l0 -38"/>
    </g>
    <g fill="#ffffff">
      <circle cx="60" cy="60" r="13"/><circle cx="160" cy="60" r="13"/><circle cx="260" cy="60" r="13"/>
      <circle cx="60" cy="160" r="13"/><circle cx="160" cy="160" r="13"/><circle cx="260" cy="160" r="13"/>
      <circle cx="60" cy="260" r="13"/><circle cx="160" cy="260" r="13"/><circle cx="260" cy="260" r="13"/>
    </g>
  </g>
  <g transform="translate(520 128)">
    <rect width="270" height="260" rx="12" fill="#0b1117" stroke="#2d3c48"/>
    <path d="M34 213 H232 M34 42 V213" stroke="#6f7f8f" stroke-width="2"/>
    <path d="M38 142 C58 64 79 57 96 139 C113 222 140 216 157 134 C174 58 205 83 226 150" fill="none" stroke="#4facfe" stroke-width="5"/>
    <text x="36" y="242" fill="#b0b0b0" font-family="Arial, sans-serif" font-size="18">mPDF signal</text>
  </g>
</svg>
