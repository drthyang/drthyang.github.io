<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 790" role="img" aria-labelledby="title desc">
  <title id="title">MATERIA architecture</title>
  <desc id="desc">Three shells — web app UI, MCP agent server, and web workers — sit on shared parsers and visualization utilities, all calling a pure TypeScript scientific core of eight modules, validated by a 750-test layer.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#55657a"/>
    </marker>
  </defs>

  <rect width="900" height="790" fill="#090d12"/>

  <!-- Shell layer -->
  <g>
    <rect x="20" y="20" width="272" height="96" rx="10" fill="#10233c" stroke="#4facfe" stroke-opacity="0.75" stroke-width="1.8"/>
    <text x="156" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#eaf4ff">Web app UI</text>
    <text x="156" y="90" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="18" fill="#6fb7f0">src/app &#183; src/components</text>

    <rect x="314" y="20" width="272" height="96" rx="10" fill="#10233c" stroke="#4facfe" stroke-opacity="0.75" stroke-width="1.8"/>
    <text x="450" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#eaf4ff">MCP agent server</text>
    <text x="450" y="90" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="18" fill="#6fb7f0">src/mcp &#183; 18-tool registry</text>

    <rect x="608" y="20" width="272" height="96" rx="10" fill="#10233c" stroke="#4facfe" stroke-opacity="0.75" stroke-width="1.8"/>
    <text x="744" y="58" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#eaf4ff">Web workers</text>
    <text x="744" y="90" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="18" fill="#6fb7f0">src/workers &#183; long solves</text>
  </g>

  <line x1="156" y1="116" x2="156" y2="146" stroke="#55657a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="450" y1="116" x2="450" y2="146" stroke="#55657a" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="744" y1="116" x2="744" y2="146" stroke="#55657a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Shared libraries -->
  <g>
    <rect x="115" y="152" width="310" height="88" rx="10" fill="#151b23" stroke="#39424e" stroke-width="1.6"/>
    <text x="270" y="190" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#cfd8e3">Parsers</text>
    <text x="270" y="220" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="18" fill="#8b98a5">CIF, GSAS, FullProf, hkl&#8230;</text>

    <rect x="475" y="152" width="310" height="88" rx="10" fill="#151b23" stroke="#39424e" stroke-width="1.6"/>
    <text x="630" y="190" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#cfd8e3">Visualization</text>
    <text x="630" y="220" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="18" fill="#8b98a5">plot data, axis units</text>
  </g>

  <line x1="450" y1="240" x2="450" y2="270" stroke="#55657a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Pure core -->
  <rect x="20" y="278" width="860" height="352" rx="14" fill="#0b1017" stroke="#46566a" stroke-width="1.6" stroke-dasharray="7 6"/>
  <text x="48" y="314" font-family="'SF Mono', Menlo, monospace" font-size="20" fill="#8fa8bd">src/core &#8212; pure TypeScript &#183; no DOM &#183; no React</text>

  <g>
    <rect x="45" y="332" width="190" height="104" rx="10" fill="#0e211c" stroke="#2f9e77" stroke-opacity="0.7" stroke-width="1.6"/>
    <text x="140" y="376" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700" fill="#86e8bb">workflow</text>
    <text x="140" y="408" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="17" fill="#8fb3a5">problem builders</text>

    <rect x="251" y="332" width="190" height="104" rx="10" fill="#0e211c" stroke="#2f9e77" stroke-opacity="0.7" stroke-width="1.6"/>
    <text x="346" y="376" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700" fill="#86e8bb">refinement</text>
    <text x="346" y="408" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="17" fill="#8fb3a5">LM engine, esds</text>

    <rect x="457" y="332" width="190" height="104" rx="10" fill="#0e211c" stroke="#2f9e77" stroke-opacity="0.7" stroke-width="1.6"/>
    <text x="552" y="376" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700" fill="#86e8bb">diffraction</text>
    <text x="552" y="408" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="17" fill="#8fb3a5">F&#178;, profiles, ticks</text>

    <rect x="663" y="332" width="190" height="104" rx="10" fill="#0e211c" stroke="#2f9e77" stroke-opacity="0.7" stroke-width="1.6"/>
    <text x="758" y="376" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700" fill="#86e8bb">magnetic</text>
    <text x="758" y="408" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="17" fill="#8fb3a5">MSG, k, moments</text>

    <rect x="45" y="452" width="190" height="104" rx="10" fill="#0e211c" stroke="#2f9e77" stroke-opacity="0.7" stroke-width="1.6"/>
    <text x="140" y="496" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700" fill="#86e8bb">crystal</text>
    <text x="140" y="528" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="17" fill="#8fb3a5">symmetry, cells</text>

    <rect x="251" y="452" width="190" height="104" rx="10" fill="#0e211c" stroke="#2f9e77" stroke-opacity="0.7" stroke-width="1.6"/>
    <text x="346" y="496" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700" fill="#86e8bb">scattering</text>
    <text x="346" y="528" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="17" fill="#8fb3a5">b, f(Q), &#10216;j0&#10217; tables</text>

    <rect x="457" y="452" width="190" height="104" rx="10" fill="#0e211c" stroke="#2f9e77" stroke-opacity="0.7" stroke-width="1.6"/>
    <text x="552" y="496" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700" fill="#86e8bb">diagnostics</text>
    <text x="552" y="528" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="17" fill="#8fb3a5">assess, suggest</text>

    <rect x="663" y="452" width="190" height="104" rx="10" fill="#0e211c" stroke="#2f9e77" stroke-opacity="0.7" stroke-width="1.6"/>
    <text x="758" y="496" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="700" fill="#86e8bb">export</text>
    <text x="758" y="528" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="17" fill="#8fb3a5">CIF, mCIF, bundles</text>
  </g>

  <!-- Validation layer -->
  <rect x="20" y="650" width="860" height="112" rx="10" fill="#151b23" stroke="#39424e" stroke-width="1.6"/>
  <text x="450" y="696" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#e2e9f0">Validation layer &#8212; 750 tests</text>
  <text x="450" y="730" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="19" fill="#8b98a5">golden GSAS-II datasets &#183; MCP contract shapes &#183; doc-sync</text>
</svg>
