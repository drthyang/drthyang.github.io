<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Average kagome magnetic structure</title>
  <desc id="desc">A simplified kagome lattice and antiferromagnetic stacking diagram.</desc>
  <rect width="900" height="520" fill="#090d12"/>
  <rect x="34" y="34" width="832" height="452" rx="18" fill="#111820" stroke="#2d3c48"/>
  <text x="62" y="82" fill="#ffffff" font-family="Arial, sans-serif" font-size="30" font-weight="700">Average Hexagonal Magnetic Structure</text>
  <g transform="translate(120 135)" stroke="#4facfe" stroke-width="3" fill="none">
    <path d="M0 90 L85 40 L170 90 L170 190 L85 240 L0 190 Z"/>
    <path d="M170 90 L255 40 L340 90 L340 190 L255 240 L170 190 Z"/>
    <path d="M85 240 L170 190 L255 240 L255 340 L170 390 L85 340 Z"/>
  </g>
  <g fill="#ffffff">
    <circle cx="120" cy="225" r="12"/><circle cx="205" cy="175" r="12"/><circle cx="290" cy="225" r="12"/>
    <circle cx="290" cy="325" r="12"/><circle cx="205" cy="375" r="12"/><circle cx="120" cy="325" r="12"/>
    <circle cx="375" cy="175" r="12"/><circle cx="460" cy="225" r="12"/><circle cx="460" cy="325" r="12"/>
    <circle cx="375" cy="375" r="12"/><circle cx="290" cy="515" r="0"/>
  </g>
  <g stroke="#ffcc66" stroke-width="5" stroke-linecap="round">
    <path d="M585 170 v80"/><path d="M665 250 v-80"/><path d="M745 170 v80"/>
    <path d="M585 330 v-80"/><path d="M665 250 v80"/><path d="M745 330 v-80"/>
  </g>
  <text x="560" y="395" fill="#b0b0b0" font-family="Arial, sans-serif" font-size="20">A-type AFM stacking</text>
</svg>
