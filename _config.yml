      icon: "fab fa-fw fa-github"
      url: "https://github.com/Tsung-Han-Yang"

---
# This front matter ensures Jekyll processes the SCSS
---

/* Define color variables based on the active skin */
:root {
  /* Default Light Skin (Air/Contrast) Settings */
  --pub-bg: #ffffff;
  --pub-title: #222222;
  --pub-text: #444444;
  --pub-accent: #0366d6; /* Professional blue */
  --pub-border: #eeeeee;
}

/* Automatically override variables if the dark skin is active */
[data-theme='dark'], .theme-dark, body.dark-mode {
  --pub-bg: #1a1a1a;
  --pub-title: #ffffff;
  --pub-text: #b0b0b0;
  --pub-accent: #4facfe; /* Electric blue */
  --pub-border: #333333;
}

/* --- REUSABLE PUBLICATION & RESEARCH STYLES --- */
.pub-row, .research-block {
  display: flex;
  gap: 30px;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--pub-border);
  color: var(--pub-text);
}

.pub-title, .research-title {
  color: var(--pub-title);
  font-weight: bold;
  font-size: 1.1rem;
  display: block;
}

.me-bold {
  font-weight: 800;
  color: var(--pub-title);
  text-decoration: underline;
  text-decoration-color: var(--pub-accent);
}

.link-bar a, .project-link {
  color: var(--pub-accent);
  font-weight: 600;
  text-decoration: none;
  font-size: 0.85rem;
}